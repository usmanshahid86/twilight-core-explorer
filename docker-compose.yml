services:
  postgres:
    image: postgres:16
    container_name: twilight-core-explorer-postgres
    environment:
      POSTGRES_USER: twilight
      POSTGRES_PASSWORD: twilight
      POSTGRES_DB: twilight_explorer
    ports:
      - "5432:5432"
    volumes:
      - twilight_explorer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twilight -d twilight_explorer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  twilight_explorer_pgdata:
